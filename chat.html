<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        * { font-family: "Rubik", sans-serif; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #fff; }
        #header { background: #667744; color: #F5E6D3; padding: 15px; font-weight: bold; text-align: center; }
        #info { font-size: 0.5rem; }
        #chatbox { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 14px; background-color: #F5E6D3; }
        #input-area { display: flex; border-top: 1px solid #667744; padding: 10px; background-color: #F5E6D3; }
        input::placeholder { color: #667744; opacity: 1; }
        input { flex: 1; border: 1px solid #667744; background-color: #F5E6D3; color: #667744; padding: 8px; border-radius: 5px; outline: none; font-size: 1.001rem; }
        button { background: #667744; color: #F5E6D3; padding: 8px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer; border: 1px solid #F5E6D3; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .user { background: #667744; color: #F5E6D3; align-self: flex-end; }
        .ai { background: #667744; color: #F5E6D3; align-self: flex-start; }
        .error { background: rgb(218, 145, 145); color: #c0392b; align-self: flex-start; }
        .typing { color: #F5E6D3; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Rubik:ital,wght@0,300..900;1,300..900&family=Slabo+27px&display=swap" rel="stylesheet">
</head>
<body>

<div id="header">
    <div>Chatten Sie jetzt mit Kurti.</div>
    <div id="info">KI kann Fehler machen. Prüfen Sie die Antworten.</div>
</div>
<div id="chatbox">
    <div class="msg ai">Hallo! Ich bin Kurti und beantworte Ihnen alle Ihre Fragen rund um Kräuter und Jans Kräuterladen. Ich kann Ihnen auch Tipps geben, Sie über Wirkungsweisen informieren und Zubereitungs&shy;hinweise geben.</div>
</div>
<div id="input-area">
    <input type="text" id="userInput" placeholder="Frage eingeben..." onkeypress="if(event.key === 'Enter') senden()">
    <button id="sendBtn" onclick="senden()">Senden</button>
</div>

<script>
    const SUPABASE_URL = "https://iydsqjtkokkcbxdrwaav.supabase.co";
    const history = [];

    async function senden() {
        const input = document.getElementById("userInput");
        const chatbox = document.getElementById("chatbox");
        const btn = document.getElementById("sendBtn");
        const message = input.value.trim();
        if (!message) return;

        chatbox.innerHTML += `<div class="msg user">${message}</div>`;
        input.value = "";
        btn.disabled = true;

        const typing = document.createElement("div");
        typing.className = "msg ai typing";
        typing.id = "typing";
        typing.textContent = "Kurti schreibt...";
        chatbox.appendChild(typing);
        chatbox.scrollTop = chatbox.scrollHeight;

        history.push({ role: "user", parts: [{ text: message }] });

        try {
            const res = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message, history })
            });

            const data = await res.json();
            document.getElementById("typing").remove();

            if (data.reply) {
                history.push({ role: "model", parts: [{ text: data.reply }] });
                chatbox.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            } else {
                chatbox.innerHTML += `<div class="msg error">Fehler: ${data.error}</div>`;
            }
        } catch (err) {
            document.getElementById("typing").remove();
            chatbox.innerHTML += `<div class="msg error">Verbindungsfehler. Bitte versuchen Sie es erneut.</div>`;
        }

        btn.disabled = false;
        chatbox.scrollTop = chatbox.scrollHeight;
    }
</script>
</body>
</html>
