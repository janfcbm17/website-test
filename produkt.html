<!DOCTYPE html>
<html lang="de">
<head>
    <title>Produkt – Jans Kräuterladen</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Rubik:ital,wght@0,300..900;1,300..900&family=Slabo+27px&display=swap" rel="stylesheet">
    <style>
        .cart-badge {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--color-1); color: var(--color-2);
            font-size: 0.65rem; font-weight: 600;
            width: 16px; height: 16px; border-radius: 50%;
            margin-left: 3px; vertical-align: middle;
            display: none;
        }
        .cart-badge.visible { display: inline-flex; }

        /* BREADCRUMB */
        .breadcrumb {
            padding: 14px 12px 0;
            font-size: 0.78rem;
            color: var(--color-1);
            opacity: 0.65;
            display: flex; gap: 6px; align-items: center;
        }
        .breadcrumb a { color: var(--color-1); font-size: 0.78rem; opacity: 0.65; }
        .breadcrumb a:hover { opacity: 1; }

        /* LAYOUT */
        .product-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 14px 12px 40px;
            color: var(--color-1);
        }

        /* IMAGE */
        .product-img-wrap {
            border: 1px solid rgba(167,146,119,0.3);
            border-radius: 5px;
            overflow: hidden;
            aspect-ratio: 1/1;
            background: var(--color-2);
        }
        .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .product-img-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: var(--color-2);
        }

        /* INFO */
        .product-info { display: flex; flex-direction: column; gap: 16px; }

        .status-badge {
            display: inline-block; font-size: 0.65rem; font-weight: 500;
            letter-spacing: 0.05em; text-transform: uppercase;
            padding: 3px 8px; border-radius: 999px; align-self: flex-start;
        }
        .status-badge.verfuegbar { background: #e6f4ea; color: #2d7a3a; }
        .status-badge.bald       { background: #fff3e0; color: #a07020; }
        .status-badge.nicht      { background: #f0f0f0; color: #888; }

        .product-name {
            font-size: 1.6rem; font-weight: 500; line-height: 1.2;
            color: var(--color-1);
        }
        .product-desc {
            font-size: 0.88rem; line-height: 1.65; opacity: 0.75;
        }

        /* OPTIONS */
        .option-label {
            font-size: 0.72rem; font-weight: 500; letter-spacing: 0.07em;
            text-transform: uppercase; opacity: 0.6; margin-bottom: 8px;
        }
        .option-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .option-btn {
            font-family: "Rubik", sans-serif;
            font-size: 0.82rem;
            padding: 7px 14px;
            border: 1px solid rgba(167,146,119,0.5);
            border-radius: 5px;
            background: #fff;
            color: var(--color-1);
            cursor: pointer;
            transition: all 0.18s;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--color-1); }
        .option-btn.selected { background: var(--color-1); color: var(--color-2); border-color: var(--color-1); }
        .option-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* PRICE */
        .price-display { font-size: 1.4rem; font-weight: 400; color: var(--color-1); }

        /* QTY */
        .qty-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; opacity: 0.6; margin-bottom: 8px; }
        .qty-control {
            display: flex; align-items: center;
            border: 1px solid rgba(167,146,119,0.5);
            border-radius: 5px; overflow: hidden; width: fit-content;
        }
        .qty-btn {
            width: 36px; height: 36px; border: none; background: var(--color-2);
            font-size: 1rem; cursor: pointer; color: var(--color-1);
            transition: background 0.15s; font-family: "Rubik", sans-serif;
        }
        .qty-btn:hover { background: var(--color-1); color: var(--color-2); }
        .qty-num {
            width: 44px; height: 36px; border: none;
            border-left: 1px solid rgba(167,146,119,0.3);
            border-right: 1px solid rgba(167,146,119,0.3);
            background: #fff; text-align: center;
            font-family: "Rubik", sans-serif; font-size: 0.9rem;
            font-weight: 500; color: var(--color-1);
        }

        /* ADD TO CART */
        .add-btn {
            width: 100%; padding: 11px;
            background: var(--color-1); color: var(--color-2);
            border: none; border-radius: 5px;
            font-family: "Rubik", sans-serif; font-size: 0.85rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
        }
        .add-btn:hover:not(:disabled) { opacity: 0.85; }
        .add-btn:disabled {
            background: rgba(167,146,119,0.2); color: rgba(167,146,119,0.6);
            cursor: not-allowed;
        }

        /* DETAILS accordion */
        .detail-item {
            border-top: 1px solid rgba(167,146,119,0.25);
            padding: 10px 0;
        }
        .detail-item:last-child { border-bottom: 1px solid rgba(167,146,119,0.25); }
        details summary {
            font-size: 0.78rem; font-weight: 500; letter-spacing: 0.07em;
            text-transform: uppercase; opacity: 0.65;
            cursor: pointer; list-style: none; display: flex;
            justify-content: space-between; align-items: center;
        }
        details summary::after { content: '+'; font-size: 1rem; font-weight: 300; }
        details[open] summary::after { content: '−'; }
        details p {
            font-size: 0.85rem; line-height: 1.65; opacity: 0.7;
            padding-top: 8px;
        }

        /* TOAST */
        .toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(6px);
            background: var(--color-1); color: var(--color-2);
            padding: 10px 20px; border-radius: 5px;
            font-size: 0.82rem; opacity: 0; transition: all 0.25s;
            pointer-events: none; z-index: 999; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* LOADING */
        .state-box { text-align: center; padding: 3rem 1rem; color: var(--color-1); opacity: 0.6; }
        .spinner { width: 26px; height: 26px; border: 2px solid rgba(167,146,119,0.3); border-top-color: var(--color-1); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 0.75rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (min-width: 680px) {
            .product-layout { grid-template-columns: 1fr 1fr; align-items: start; padding: 20px 50px 60px; }
            .breadcrumb { padding: 16px 50px 0; }
            .product-img-wrap { position: sticky; top: 20px; }
        }
        @media (min-width: 900px) {
            .product-layout { grid-template-columns: 1fr 1fr; gap: 40px; }
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="nav-logo">Jans Kräuterladen</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html">Kontakt</a>
            <a href="shop.html" class="underlined">Shop</a>
            <a href="warenkorb.html">Warenkorb<span class="cart-badge" id="cartBadge">0</span></a>
        </div>
    </nav>
</header>

<main>
    <div id="loadingState" class="state-box">
        <div class="spinner"></div>
        <p>Produkt wird geladen…</p>
    </div>
    <div id="errorState" class="state-box" style="display:none">
        <p id="errorMsg">Produkt nicht gefunden.</p>
    </div>

    <div id="productContent" style="display:none">
        <div class="breadcrumb">
            <a href="shop.html">Shop</a> / <span id="breadName"></span>
        </div>

        <div class="product-layout">
            <div class="product-img-wrap" id="imgWrap">
                <div class="product-img-placeholder">
                    <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#A79277" stroke-width="0.8" opacity="0.4"><circle cx="12" cy="12" r="9"/></svg>
                </div>
            </div>

            <div class="product-info">
                <span class="status-badge" id="statusBadge"></span>
                <h1 class="product-name" id="productName"></h1>
                <p class="product-desc" id="productDesc"></p>

                <div>
                    <div class="option-label">Option wählen</div>
                    <div class="option-grid" id="optionGrid"></div>
                </div>

                <div class="price-display" id="priceDisplay">–</div>

                <div>
                    <div class="qty-label">Menge</div>
                    <div class="qty-control">
                        <button class="qty-btn" id="qtyMinus">−</button>
                        <input class="qty-num" id="qtyNum" type="number" value="1" min="1" readonly />
                        <button class="qty-btn" id="qtyPlus">+</button>
                    </div>
                </div>

                <button class="add-btn" id="addBtn">In den Warenkorb</button>

                <div class="detail-item">
                    <details>
                        <summary>Beschreibung</summary>
                        <p id="detailDesc"></p>
                    </details>
                </div>
                <div class="detail-item">
                    <details>
                        <summary>Lagerungshinweis</summary>
                        <p id="detailStorage"></p>
                    </details>
                </div>
                <div class="detail-item">
                    <details>
                        <summary>Zubereitungstipps</summary>
                        <p id="detailPrep"></p>
                    </details>
                </div>
            </div>
        </div>
    </div>
</main>

<footer>
    <div class="footer-logo">Jans Kräuterladen</div>
    <div class="footer-links">
        <a href="datenschutzerklärung.html">Datenschutzerklärung</a>
        <a href="impressum.html">Impressum</a>
        <a href="AGB.html">AGB</a>
        <a href="widerrufsbelehrung.html">Widerrufsbelehrung</a>
    </div>
    <div class="footer-copyright">&copy; 2026 Jans Kräuterladen</div>
</footer>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL  = 'https://iydsqjtkokkcbxdrwaav.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZHNxanRrb2trY2J4ZHJ3YWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Njk2NTIsImV4cCI6MjA5MjE0NTY1Mn0.qLiRzBRJuYr7Q65UGueVY76BKP6huOVnnxUqWKdjgCI';
const BUCKET = 'produkte';
const JSON_FILE = 'products.json';

let product = null, selectedOption = null, qty = 1;

function getCart() { return JSON.parse(localStorage.getItem('kraeuterladen_cart') || '[]'); }
function saveCart(c) { localStorage.setItem('kraeuterladen_cart', JSON.stringify(c)); }
function imageUrl(p) { return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${p}`; }

function updateCartBadge() {
    const total = getCart().reduce((s, i) => s + i.menge, 0);
    const el = document.getElementById('cartBadge');
    el.textContent = total;
    el.classList.toggle('visible', total > 0);
}

function optLabel(v) { return v <= 5 ? `${v} Stück` : `${v} g`; }

function statusClass(s) {
    if (s === 'verfügbar') return 'verfuegbar';
    if (s === 'bald verfügbar') return 'bald';
    return 'nicht';
}
function statusLabel(s) {
    if (s === 'verfügbar') return 'Verfügbar';
    if (s === 'bald verfügbar') return 'Bald verfügbar';
    return 'Nicht verfügbar';
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

function renderOptions() {
    const grid = document.getElementById('optionGrid');
    grid.innerHTML = '';
    product.optionen.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.disabled = opt.stock < 1;
        btn.textContent = optLabel(opt.option);
        if (opt.stock < 1) btn.title = 'Ausverkauft';
        btn.addEventListener('click', () => selectOption(opt, btn));
        grid.appendChild(btn);
    });
    // auto-select first available
    const firstAvail = product.optionen.find(o => o.stock >= 1);
    if (firstAvail) {
        const firstBtn = grid.querySelector('button:not(:disabled)');
        selectOption(firstAvail, firstBtn);
    } else {
        updateAddBtn();
    }
}

function selectOption(opt, btn) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedOption = opt;
    document.getElementById('priceDisplay').textContent = opt.preis.toFixed(2).replace('.', ',') + ' €';
    document.getElementById('qtyNum').max = opt.stock;
    if (qty > opt.stock) { qty = opt.stock; document.getElementById('qtyNum').value = qty; }
    updateAddBtn();
}

function updateAddBtn() {
    const btn = document.getElementById('addBtn');
    const s = product['produkt-status'];
    if (s !== 'verfügbar' || !selectedOption || selectedOption.stock < 1) {
        btn.disabled = true;
        btn.textContent = s === 'bald verfügbar' ? 'Bald verfügbar' : 'Nicht verfügbar';
    } else {
        btn.disabled = false;
        btn.textContent = 'In den Warenkorb';
    }
}

document.getElementById('qtyMinus').addEventListener('click', () => {
    if (qty > 1) { qty--; document.getElementById('qtyNum').value = qty; }
});
document.getElementById('qtyPlus').addEventListener('click', () => {
    const max = selectedOption ? selectedOption.stock : 99;
    if (qty < max) { qty++; document.getElementById('qtyNum').value = qty; }
});
document.getElementById('addBtn').addEventListener('click', () => {
    if (!selectedOption) return;
    const cart = getCart();
    const key = `${product.id}_${selectedOption.option}`;
    const ex = cart.find(i => i.key === key);
    if (ex) { ex.menge = Math.min(ex.menge + qty, selectedOption.stock); }
    else { cart.push({ key, produktId: product.id, name: product['produkt-name'], option: selectedOption.option, preis: selectedOption.preis, menge: qty, bild: product['produkt-bild'] }); }
    saveCart(cart);
    updateCartBadge();
    showToast(`${product['produkt-name']} in den Warenkorb gelegt ✓`);
});

(async () => {
    updateCartBadge();
    const id = parseInt(new URLSearchParams(location.search).get('id'));
    if (!id) { showError('Keine Produkt-ID angegeben.'); return; }
    try {
        const res = await fetch(
            `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${JSON_FILE}`,
            { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
        );
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const products = await res.json();
        product = products.find(p => p.id === id);
        if (!product) throw new Error('Produkt nicht gefunden');

        document.title = `${product['produkt-name']} – Jans Kräuterladen`;
        document.getElementById('breadName').textContent = product['produkt-name'];
        document.getElementById('productName').textContent = product['produkt-name'];
        document.getElementById('productDesc').textContent = product['produkt-beschreibung'];
        document.getElementById('detailDesc').textContent = product['produkt-beschreibung'];
        document.getElementById('detailStorage').textContent = product['lagerungshinweis'];
        document.getElementById('detailPrep').textContent = product['zubereitungstipps'];

        const badge = document.getElementById('statusBadge');
        badge.textContent = statusLabel(product['produkt-status']);
        badge.className = `status-badge ${statusClass(product['produkt-status'])}`;

        const imgWrap = document.getElementById('imgWrap');
        const img = document.createElement('img');
        img.alt = product['produkt-name'];
        img.src = imageUrl(product['produkt-bild']);
        img.onerror = () => { imgWrap.innerHTML = '<div class="product-img-placeholder"><svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#A79277" stroke-width="0.8" opacity="0.4"><circle cx="12" cy="12" r="9"/></svg></div>'; };
        imgWrap.innerHTML = '';
        imgWrap.appendChild(img);

        renderOptions();
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('productContent').style.display = 'block';
    } catch(e) { showError(e.message); }
})();

function showError(msg) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorMsg').textContent = msg;
}
</script>
</body>
</html>
