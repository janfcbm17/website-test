<!DOCTYPE html>
<html lang="de">
<head>
    <title>Shop – Jans Kräuterladen</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Rubik:ital,wght@0,300..900;1,300..900&family=Slabo+27px&display=swap" rel="stylesheet">
    <style>
        /* ── SHOP SPECIFIC ── */
        .shop-header {
            color: var(--color-1);
            padding: 24px 12px 8px;
            text-align: center;
        }
        .shop-header h1 {
            font-size: 1.6rem;
            font-weight: 500;
            color: var(--color-1);
            margin-bottom: 4px;
        }
        .shop-header p {
            font-size: 0.88rem;
            opacity: 0.75;
        }

        /* FILTER */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            padding: 12px 12px 0;
        }
        .filter-btn {
            font-family: "Rubik", sans-serif;
            font-size: 0.78rem;
            padding: 5px 14px;
            border: 1px solid var(--color-1);
            border-radius: 999px;
            background: transparent;
            color: var(--color-1);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover { background: var(--color-1); color: var(--color-2); }
        .filter-btn.active { background: var(--color-1); color: var(--color-2); }

        /* SECTION LABEL */
        .section-label {
            color: var(--color-1);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.6;
            padding: 20px 12px 6px;
            border-bottom: 1px solid rgba(167,146,119,0.25);
            margin: 0 12px;
        }

        /* GRID */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px 12px;
        }

        /* CARD */
        .product-card {
            border: 1px solid rgba(167,146,119,0.35);
            border-radius: 5px;
            overflow: hidden;
            text-decoration: none;
            color: var(--color-1);
            background: #fff;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
            opacity: 0;
            animation: fadeUp 0.35s ease forwards;
        }
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(167,146,119,0.2);
        }
        .product-card.unavailable { opacity: 0; animation: fadeUp 0.35s ease forwards; filter: grayscale(0.3); }

        .card-img {
            width: 100%; aspect-ratio: 1/1;
            background: var(--color-2);
            overflow: hidden;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .product-card:hover .card-img img { transform: scale(1.04); }
        .card-img-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: var(--color-2);
        }

        .card-body { padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .card-name { font-size: 0.95rem; font-weight: 500; line-height: 1.2; }
        .card-price { font-size: 0.8rem; opacity: 0.75; }
        .card-price strong { font-weight: 600; opacity: 1; }

        .status-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 999px;
            margin-top: auto;
            align-self: flex-start;
        }
        .status-badge.verfuegbar { background: #e6f4ea; color: #2d7a3a; }
        .status-badge.bald       { background: #fff3e0; color: #a07020; }
        .status-badge.nicht      { background: #f0f0f0; color: #888; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* LOADING */
        .state-box { text-align: center; padding: 3rem 1rem; color: var(--color-1); opacity: 0.6; }
        .spinner {
            width: 26px; height: 26px;
            border: 2px solid rgba(167,146,119,0.3);
            border-top-color: var(--color-1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* CART BADGE IN NAV */
        .cart-badge {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--color-1); color: var(--color-2);
            font-size: 0.65rem; font-weight: 600;
            width: 16px; height: 16px; border-radius: 50%;
            margin-left: 3px; vertical-align: middle;
            display: none;
        }
        .cart-badge.visible { display: inline-flex; }

        @media (min-width: 560px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 900px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); padding: 10px 50px; }
            .section-label { margin: 0 50px; }
            .filter-bar { padding: 12px 50px 0; justify-content: flex-start; }
            .shop-header { text-align: left; padding: 28px 50px 8px; }
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="nav-logo">Jans Kräuterladen</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html">Kontakt</a>
            <a href="shop.html" class="underlined">Shop</a>
            <a href="warenkorb.html">Warenkorb<span class="cart-badge" id="cartBadge">0</span></a>
        </div>
    </nav>
</header>

<main>
    <div class="shop-header">
        <h1>Unser Sortiment</h1>
        <p>Handverlesene Kräuter & Tees aus regionaler Ernte</p>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="verfügbar">Verfügbar</button>
        <button class="filter-btn" data-filter="bald verfügbar">Bald verfügbar</button>
        <button class="filter-btn" data-filter="nicht verfügbar">Nicht verfügbar</button>
    </div>

    <div id="loadingState" class="state-box">
        <div class="spinner"></div>
        <p>Produkte werden geladen…</p>
    </div>
    <div id="errorState" class="state-box" style="display:none">
        <p id="errorMsg">Fehler beim Laden.</p>
    </div>

    <div id="shopContent" style="display:none">
        <div id="availableLabel" class="section-label" style="display:none">Verfügbar</div>
        <div class="product-grid" id="availableGrid"></div>
        <div id="otherLabel" class="section-label" style="display:none">Weitere Produkte</div>
        <div class="product-grid" id="otherGrid"></div>
    </div>
</main>

<footer>
    <div class="footer-logo">Jans Kräuterladen</div>
    <div class="footer-links">
        <a href="datenschutzerklärung.html">Datenschutzerklärung</a>
        <a href="impressum.html">Impressum</a>
        <a href="AGB.html">AGB</a>
        <a href="widerrufsbelehrung.html">Widerrufsbelehrung</a>
    </div>
    <div class="footer-copyright">&copy; 2026 Jans Kräuterladen</div>
</footer>

<script>
const SUPABASE_URL  = 'https://iydsqjtkokkcbxdrwaav.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZHNxanRrb2trY2J4ZHJ3YWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Njk2NTIsImV4cCI6MjA5MjE0NTY1Mn0.qLiRzBRJuYr7Q65UGueVY76BKP6huOVnnxUqWKdjgCI';
const BUCKET = 'produkte';
const JSON_FILE = 'products.json';

let allProducts = [];
let activeFilter = 'all';

function getCart() { return JSON.parse(localStorage.getItem('kraeuterladen_cart') || '[]'); }

function updateCartBadge() {
    const total = getCart().reduce((s, i) => s + i.menge, 0);
    const el = document.getElementById('cartBadge');
    el.textContent = total;
    el.classList.toggle('visible', total > 0);
}

function imageUrl(path) {
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

function lowestPrice(optionen) {
    const avail = optionen.filter(o => o.stock >= 1);
    if (!avail.length) return null;
    return Math.min(...avail.map(o => o.preis));
}

function optLabel(val) {
    return val <= 5 ? `${val} Stück` : `${val} g`;
}

function statusClass(s) {
    if (s === 'verfügbar') return 'verfuegbar';
    if (s === 'bald verfügbar') return 'bald';
    return 'nicht';
}
function statusLabel(s) {
    if (s === 'verfügbar') return 'Verfügbar';
    if (s === 'bald verfügbar') return 'Bald verfügbar';
    return 'Nicht verfügbar';
}

function renderCard(p, delay) {
    const price = lowestPrice(p.optionen);
    const a = document.createElement('a');
    a.className = 'product-card';
    a.href = `produkt.html?id=${p.id}`;
    a.style.animationDelay = `${delay * 55}ms`;
    a.innerHTML = `
        <div class="card-img">
            <img src="${imageUrl(p['produkt-bild'])}" alt="${p['produkt-name']}"
                onerror="this.parentElement.innerHTML='<div class=\\'card-img-placeholder\\'><svg width=\\'36\\' height=\\'36\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'#A79277\\' stroke-width=\\'1\\'><circle cx=\\'12\\' cy=\\'12\\' r=\\'9\\'/>\\<line x1=\\'12\\' y1=\\'8\\' x2=\\'12\\' y2=\\'16\\'/>\\<line x1=\\'8\\' y1=\\'12\\' x2=\\'16\\' y2=\\'12\\'/></svg></div>'" />
        </div>
        <div class="card-body">
            <div class="card-name">${p['produkt-name']}</div>
            <div class="card-price">
                ${price !== null
                    ? `ab <strong>${price.toFixed(2).replace('.', ',')} €</strong>`
                    : '<span style="opacity:0.5;font-size:0.75rem">Preis auf Anfrage</span>'}
            </div>
            <span class="status-badge ${statusClass(p['produkt-status'])}">${statusLabel(p['produkt-status'])}</span>
        </div>`;
    return a;
}

function renderGrid() {
    const ag = document.getElementById('availableGrid');
    const og = document.getElementById('otherGrid');
    const al = document.getElementById('availableLabel');
    const ol = document.getElementById('otherLabel');
    ag.innerHTML = ''; og.innerHTML = '';

    const filtered = activeFilter === 'all'
        ? allProducts
        : allProducts.filter(p => p['produkt-status'] === activeFilter);

    const avail = filtered.filter(p => p['produkt-status'] === 'verfügbar');
    const rest  = filtered.filter(p => p['produkt-status'] !== 'verfügbar');

    al.style.display = avail.length ? 'block' : 'none';
    ol.style.display = rest.length  ? 'block' : 'none';

    avail.forEach((p, i) => ag.appendChild(renderCard(p, i)));
    rest.forEach((p, i)  => og.appendChild(renderCard(p, i)));
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderGrid();
    });
});

(async () => {
    updateCartBadge();
    try {
        const res = await fetch(
            `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${JSON_FILE}`,
            { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
        );
        if (!res.ok) throw new Error('HTTP ' + res.status);
        allProducts = await res.json();
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('shopContent').style.display = 'block';
        renderGrid();
    } catch(e) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
        document.getElementById('errorMsg').textContent = 'Produkte konnten nicht geladen werden: ' + e.message;
    }
})();
</script>
</body>
</html>
